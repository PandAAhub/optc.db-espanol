<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base de Datos - OPTC Database Español</title>

<!-- CSS -->
<link rel="stylesheet" href="./css/style.css">
</head>

<body>

<header>
    <h1>🏴‍☠️ OPTC Database Español</h1>
</header>

<section class="hero">

    <h2>Base de Datos</h2>

    <input type="text" id="searchInput" placeholder="Buscar personaje...">

    <div class="filtros">
        <button onclick="filtrarTipo('TODOS')">Todos</button>
        <button onclick="filtrarTipo('STR')">STR</button>
        <button onclick="filtrarTipo('DEX')">DEX</button>
        <button onclick="filtrarTipo('QCK')">QCK</button>
        <button onclick="filtrarTipo('PSY')">PSY</button>
        <button onclick="filtrarTipo('INT')">INT</button>
    </div>

</section>

<main class="container">
    <section id="charactersContainer"></section>
</main>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">

        <span id="closeModal">&times;</span>

        <img id="modalImg">
        <h2 id="modalName"></h2>
        <p id="modalType"></p>
        <p id="modalDesc"></p>

    </div>
</div>

<!-- JS -->
<script src="./js/database.js"></script>

</body>
</html>
